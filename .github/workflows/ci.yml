name: AquaSentinel CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # -----------------------------------------------------------------------
  # Backend Python tests
  # -----------------------------------------------------------------------
  python-tests:
    name: Python Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: aquasentinel_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:testpassword@localhost:5432/aquasentinel_test
      DATABASE_URL_SYNC: postgresql+psycopg://postgres:testpassword@localhost:5432/aquasentinel_test
      SECRET_KEY: test_secret_key_for_ci
      APP_ENV: development
      VITE_MOCK_MODE: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install pytest pytest-asyncio httpx aiosqlite anyio coverage

      - name: Train ML models (required for inference tests)
        run: python apps/api/scripts/train_models.py

      - name: Run unit tests
        run: |
          python -m pytest tests/api/test_ml.py -v

      - name: Run API endpoint tests
        run: |
          python -m pytest tests/api/test_endpoints.py -v

      - name: Coverage report
        run: |
          coverage run -m pytest tests/ -v
          coverage report --fail-under=60

  # -----------------------------------------------------------------------
  # Frontend TypeScript / Vite
  # -----------------------------------------------------------------------
  frontend-checks:
    name: Frontend Type Check & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src --ext .ts,.tsx --max-warnings=20

      - name: Build
        run: npm run build
        env:
          VITE_MOCK_MODE: "true"
          VITE_API_BASE_URL: "/api/v1"
          VITE_WS_URL: "ws://localhost:8000"

  # -----------------------------------------------------------------------
  # Security scan
  # -----------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit security scan
        run: |
          bandit -r apps/api/ -ll --skip B101,B311 -f txt
        continue-on-error: true  # Non-blocking for now; TODO: make blocking in production
