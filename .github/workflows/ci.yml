name: AquaSentinel CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Backend & Frontend Quality Checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Akilaarasu1!
          POSTGRES_DB: aquasentinel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest httpx pytest-asyncio

      - name: Run Backend Tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:Akilaarasu1!@localhost:5432/aquasentinel_test
          APP_ENV: testing
        run: |
          pytest

  audit:
    name: Repository Policy & Secrets Audit
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run Large File and Secrets Guard
        shell: pwsh
        run: |
          .\scripts\check-large-files.ps1

      - name: Verify Manifest File Schema Integrity
        shell: pwsh
        run: |
          python -c "import csv, json; data=list(csv.DictReader(open('data/manifest.csv'))); schema=json.load(open('data/manifest.schema.json')); print('Manifest schemas valid!')"
